<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1180" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#444"/>
    </marker>
    <style>
      .box { fill: #f7f9fc; stroke: #4a5568; stroke-width: 1.5; rx: 8; }
      .box-raw { fill: #e8f4fc; stroke: #2b6cb0; }
      .box-setup { fill: #edf2f7; stroke: #4a5568; }
      .box-feature { fill: #e6fffa; stroke: #2c7a7b; }
      .box-core { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .box-support { fill: #f3f4f6; stroke: #6b7280; }
      .box-out { fill: #1a202c; stroke: #1a202c; }
      .title { font-size: 15px; font-weight: 700; fill: #1a202c; }
      .sub { font-size: 12px; fill: #4a5568; }
      .out-text { fill: #fff; font-size: 15px; font-weight: 700; }
      .label { font-size: 11px; fill: #718096; font-style: italic; }
      .line { stroke: #444; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .hline { font-size: 13px; font-weight: 700; fill: #2d3748; }
    </style>
  </defs>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" class="hline" font-size="18">Moodle Engagement Research Pipeline</text>

  <!-- Phase labels -->
  <text x="40" y="88" class="label">RAW DATA</text>
  <text x="40" y="248" class="label">VERIFY (01-03)</text>
  <text x="40" y="448" class="label">FEATURES (04-05)</text>
  <text x="40" y="620" class="label">ANALYSES</text>
  <text x="40" y="1020" class="label">OUTPUT</text>

  <!-- Raw -->
  <rect x="260" y="60" width="400" height="56" class="box box-raw"/>
  <text x="460" y="84" text-anchor="middle" class="title">Data/*.RData</text>
  <text x="460" y="102" text-anchor="middle" class="sub">dat (event log) · grades · sem (F/I/D contributions)</text>

  <!-- Setup chain -->
  <rect x="310" y="150" width="300" height="44" class="box box-setup"/>
  <text x="460" y="177" text-anchor="middle" class="title">01_verify_metric.R</text>

  <rect x="310" y="220" width="300" height="44" class="box box-setup"/>
  <text x="460" y="247" text-anchor="middle" class="title">02_check_schema.R</text>

  <rect x="310" y="290" width="300" height="44" class="box box-setup"/>
  <text x="460" y="317" text-anchor="middle" class="title">03_data_inventory.R</text>

  <!-- Features -->
  <rect x="310" y="370" width="300" height="44" class="box box-feature"/>
  <text x="460" y="397" text-anchor="middle" class="title">04_build_features.R</text>

  <rect x="310" y="440" width="300" height="44" class="box box-feature"/>
  <text x="460" y="467" text-anchor="middle" class="title">05_build_model_df.R</text>

  <!-- Central hub -->
  <rect x="280" y="520" width="360" height="52" class="box box-feature"/>
  <text x="460" y="544" text-anchor="middle" class="title">model_df.rds</text>
  <text x="460" y="562" text-anchor="middle" class="sub">student × week · z-scored cum F/I/D · final_grade</text>

  <!-- Headline RQs -->
  <rect x="60" y="630" width="200" height="56" class="box box-core"/>
  <text x="160" y="654" text-anchor="middle" class="title">13_indicator_importance</text>
  <text x="160" y="672" text-anchor="middle" class="sub">LMG · RQ1 (§4.2)</text>

  <rect x="360" y="630" width="200" height="56" class="box box-core"/>
  <text x="460" y="654" text-anchor="middle" class="title">11_outcome_models</text>
  <text x="460" y="672" text-anchor="middle" class="sub">Quantile reg · RQ2 (§4.3)</text>

  <!-- Supporting row 1 -->
  <rect x="660" y="630" width="200" height="56" class="box box-support"/>
  <text x="760" y="654" text-anchor="middle" class="title">12_pooled_mixed_meta</text>
  <text x="760" y="672" text-anchor="middle" class="sub">Pooled r · §4.1</text>

  <rect x="60" y="720" width="155" height="48" class="box box-support"/>
  <text x="137" y="749" text-anchor="middle" class="title">06_replicate_paper</text>

  <rect x="235" y="720" width="155" height="48" class="box box-support"/>
  <text x="312" y="749" text-anchor="middle" class="title">07_interaction</text>

  <rect x="410" y="720" width="155" height="48" class="box box-support"/>
  <text x="487" y="749" text-anchor="middle" class="title">08_early_warning</text>

  <rect x="585" y="720" width="155" height="48" class="box box-support"/>
  <text x="662" y="749" text-anchor="middle" class="title">09_stat0002_repl</text>

  <rect x="760" y="720" width="120" height="48" class="box box-support"/>
  <text x="820" y="749" text-anchor="middle" class="title">10_profiles</text>

  <!-- Supporting row 2 -->
  <rect x="60" y="790" width="130" height="48" class="box box-support"/>
  <text x="125" y="819" text-anchor="middle" class="title">14_assessment</text>

  <rect x="210" y="790" width="130" height="48" class="box box-support"/>
  <text x="275" y="819" text-anchor="middle" class="title">15_stabilise</text>

  <rect x="360" y="790" width="130" height="48" class="box box-support"/>
  <text x="425" y="819" text-anchor="middle" class="title">16_temporal</text>

  <rect x="510" y="790" width="130" height="48" class="box box-support"/>
  <text x="575" y="819" text-anchor="middle" class="title">17_trajectory</text>

  <rect x="660" y="790" width="130" height="48" class="box box-support"/>
  <text x="725" y="819" text-anchor="middle" class="title">18_robustness</text>

  <rect x="810" y="790" width="90" height="48" class="box box-support"/>
  <text x="855" y="819" text-anchor="middle" class="title">19_synth</text>

  <!-- Report -->
  <rect x="300" y="920" width="320" height="56" class="box-out"/>
  <text x="460" y="946" text-anchor="middle" class="out-text">report/report.tex</text>
  <text x="460" y="964" text-anchor="middle" class="out-text" font-size="12" font-weight="400">’ report.pdf</text>

  <!-- Vertical spine -->
  <line x1="460" y1="116" x2="460" y2="150" class="line"/>
  <line x1="460" y1="194" x2="460" y2="220" class="line"/>
  <line x1="460" y1="264" x2="460" y2="290" class="line"/>
  <line x1="460" y1="334" x2="460" y2="370" class="line"/>
  <line x1="460" y1="414" x2="460" y2="440" class="line"/>
  <line x1="460" y1="484" x2="460" y2="520" class="line"/>

  <!-- Hub to analyses -->
  <line x1="460" y1="572" x2="460" y2="600" class="line"/>
  <line x1="460" y1="600" x2="160" y2="600" class="line" marker-end="none"/>
  <line x1="460" y1="600" x2="760" y2="600" class="line" marker-end="none"/>
  <line x1="160" y1="600" x2="160" y2="630" class="line"/>
  <line x1="460" y1="600" x2="460" y2="630" class="line"/>
  <line x1="760" y1="600" x2="760" y2="630" class="line"/>

  <!-- To support rows -->
  <line x1="160" y1="686" x2="137" y2="710" class="line" marker-end="none"/>
  <line x1="137" y1="710" x2="820" y2="710" class="line" marker-end="none"/>
  <line x1="137" y1="710" x2="137" y2="720" class="line"/>
  <line x1="312" y1="710" x2="312" y2="720" class="line"/>
  <line x1="487" y1="710" x2="487" y2="720" class="line"/>
  <line x1="662" y1="710" x2="662" y2="720" class="line"/>
  <line x1="820" y1="710" x2="820" y2="720" class="line"/>

  <line x1="460" y1="686" x2="460" y2="700" class="line" marker-end="none"/>
  <line x1="125" y1="700" x2="855" y2="700" class="line" marker-end="none"/>
  <line x1="125" y1="700" x2="125" y2="790" class="line"/>
  <line x1="275" y1="700" x2="275" y2="790" class="line"/>
  <line x1="425" y1="700" x2="425" y2="790" class="line"/>
  <line x1="575" y1="700" x2="575" y2="790" class="line"/>
  <line x1="725" y1="700" x2="725" y2="790" class="line"/>
  <line x1="855" y1="700" x2="855" y2="790" class="line"/>

  <!-- To report -->
  <line x1="460" y1="838" x2="460" y2="880" class="line" marker-end="none"/>
  <line x1="160" y1="880" x2="760" y2="880" class="line" marker-end="none"/>
  <line x1="160" y1="880" x2="160" y2="900" class="line" marker-end="none"/>
  <line x1="760" y1="880" x2="760" y2="900" class="line" marker-end="none"/>
  <line x1="460" y1="900" x2="460" y2="920" class="line"/>

  <!-- Legend -->
  <rect x="60" y="1010" width="18" height="18" class="box box-core"/>
  <text x="86" y="1024" class="sub">Headline RQs (professor focus)</text>
  <rect x="300" y="1010" width="18" height="18" class="box box-feature"/>
  <text x="326" y="1024" class="sub">Feature / modelling data</text>
  <rect x="530" y="1010" width="18" height="18" class="box box-support"/>
  <text x="556" y="1024" class="sub">Supporting analyses</text>
  <text x="60" y="1055" class="sub">Run all: Rscript R/run_all.R  ·  Golden file: outputs/tables/model_df.rds</text>
</svg>
